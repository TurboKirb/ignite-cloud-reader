kind = "web"
previewPath = "/"
title = "EPUB Reader"
version = "1.0.0"
id = "artifacts/epub-reader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22340

[services.development]
run = "pnpm --filter @workspace/epub-reader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/epub-reader", "run", "build" ]
publicDir = "artifacts/epub-reader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22340"
BASE_PATH = "/"
